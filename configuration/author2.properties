# Chord: press a and b -> tab
#idle-mode.macro.presstab={+a +b wait-0-200} -> +tab
#idle-mode.macro.releasetab={+a +b wait-0-200} wait-0-1000 {-a -b} -> -tab

# Sequence
# capslock gst -> 'git status'
#idle-mode.macro.gitstatus=+capslock #{-}-0-1000 +g #{-}-0-1000 +s #{-}-0-1000 +t -> 'git status'

# Zippy chord
# gi -> 'git '
# gi . -> 'git.'
# gi c -> 'git checkout '
# gi c b -> 'git checkout -b'
#key-alias.punctuation=. , ;
#idle-mode.macro.git={+g +i}-0-500 -> 'git '
#idle-mode.macro.git-punctuation={+g +i}-0-500 #{-}-0-1000 +punctuation -> +backspace -backspace +punctuation
#idle-mode.macro.gitcheckout={+g +i}-0-500 #{-}-0-1000 +c -> 'checkout '
#idle-mode.macro.gitcheckout-punctuation={+g +i}-0-500 #{-}-0-1000 +c -c +punctuation -> +backspace -backspace +punctuation
#idle-mode.macro.gitcheckoutb={+g +i}-0-500 #{-}-0-1000 +c -c +b  -> '-b'

# Stacking 3 one-shots
key-alias.moddablekey=a b c d e f g h i j k l m n o p q r s t u v w x y z ; ` , . / 1 2 3 4 5 6 7 8 9 0 minus = f1 f2 f3 f4 f5 f6 f7 f8 f9 f10 f11 f12 insert printscreen del backspace uparrow leftarrow downarrow rightarrow tab space '
key-alias.oneshotkeys=leftshift leftctrl leftalt rightshift
key-alias.oneshotkeysandrightctrl=oneshotkeys rightctrl
# Fix IntelliJ: oneshot macro would regurgitate +leftalt when pressing `, but IntelliJ does not like it? Same for alt+f1 then 1.
oneshot-mode.macro.alttick=_{idea64.exe} ^{oneshotkeysandrightctrl} +leftalt +!leftalt -> +leftalt wait-0 +!leftalt
#idle-mode.macro.oneshot=#!{oneshotkeysandrightctrl}-200 {*oneshotkeysandrightctrl+} #!{moddablekey oneshotkeysandrightctrl}-0-2000 +moddablekey \
#  -> +oneshotkeysandrightctrl +moddablekey -oneshotkeysandrightctrl
oneshot-mode.macro.oneshot={*oneshotkeysandrightctrl+} #!{moddablekey oneshotkeysandrightctrl space}-0-2000 +moddablekey \
  -> +oneshotkeysandrightctrl +moddablekey -oneshotkeysandrightctrl
oneshot-mode=idle-mode
oneshot-mode.push-mode-to-history-stack=false
idle-mode.to.oneshot-mode=#oneshotkeysandrightctrl
# Overwrite the to.oneshot-mode command so it won't be triggered.
oneshot-mode.to.oneshot-mode=+f24
oneshot-mode.hide-cursor.enabled=true
oneshot-mode.indicator=typing-mode.indicator
oneshot-mode.indicator.idle.color=#00FF80
oneshot-mode.indicator.idle.inner-outline-color=#00FF80
key-alias.ctrl=leftctrl rightctrl
#oneshot-mode.indicator.idle.label-text= | #ctrl -> ⌃ | #leftshift -> ⇧ | #leftalt -> ⎇ \
#  | {#ctrl #leftshift #{-}} -> ⌃⇧ | {#ctrl #leftalt #{-}} -> ⌃⎇ | {#leftshift #leftalt #{-}} -> ⇧⎇ \
#  | {#ctrl #leftshift #leftalt #{-}} -> ⌃⇧⎇
oneshot-mode.indicator.idle.label-text= | {#*oneshotkeysandrightctrl+ #{-}-0-2000} -> oneshotkeysandrightctrl
oneshot-mode.indicator.idle.label-font-size=9
key-alias.oneshotandmoddablekeys=oneshotkeysandrightctrl moddablekey
key-alias.oneshotandmoddablekeysandrightctrl=oneshotkeys moddablekey rightctrl
oneshot-mode.to.typing-mode=_{typingkeys} #{*}-2000 \
  | {*oneshotkeysandrightctrl+} #!{moddablekey oneshotkeysandrightctrl space}-0-2000 +moddablekey \
  | -oneshotkeys #!{oneshotkeys}-0-2000 #oneshotkeys \
  | _{oneshotkeys} #!oneshotkeys \
  | _{oneshotkeysandrightctrl} #moddablekey \
  | #!oneshotandmoddablekeysandrightctrl
oneshot-mode.to.idle-mode=^{typingkeys} #{*}-2000 | #rightctrl
oneshot-mode.macro.redo-doubletap=-oneshotkeysandrightctrl wait-0-200 #oneshotkeysandrightctrl -> +oneshotkeysandrightctrl -oneshotkeysandrightctrl +oneshotkeysandrightctrl
oneshot-mode.break-combo-preparation=#{*}-2000