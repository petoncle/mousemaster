ui-hint-mode.hint.font-size=10
ui-hint-mode.hint.font-weight=bold
ui-hint-mode.hint.font-color=#FFFFFF
ui-hint-mode.hint.selected-font-color=#CCCCCC
ui-hint-mode.hint.font-shadow-opacity=0
ui-hint-mode.hint.font-spacing-percent=0.7
ui-hint-mode.hint.box-color=#204E8A
ui-hint-mode.hint.box-opacity=1
ui-hint-mode.hint.box-border-color=#FFFF00 | _{isrclick} -> #00FFFF | _{ismclick} -> #FF00FF | _{rightalt} -> #FFFFFF
ui-hint-mode.hint.box-border-thickness=2
ui-hint-mode.hint.cell-horizontal-padding=8
ui-hint-mode.hint.cell-vertical-padding=0
ui-hint-mode.hint.box-border-opacity=1
ui-hint-mode.hint.box-border-radius=3
ui-hint-mode.hint.background-opacity=0.2

click-after-ui-hint-mode.indicator=normal-mode.indicator
click-after-ui-hint-mode.to.hold-after-ui-hint-mode=+uihintkey-250
click-after-ui-hint-mode.press.left=_{!ismclick !isrclick} _{none | leftbutton} +uihintkey
click-after-ui-hint-mode.press.middle=_{ismclick} +uihintkey
click-after-ui-hint-mode.press.right=_{isrclick} +uihintkey
# Release the click as soon as all hint keys are released.
click-after-ui-hint-mode.release.left=_{!ismclick !isrclick} ^{uihintkey}
click-after-ui-hint-mode.release.middle=_{ismclick} ^{uihintkey}
click-after-ui-hint-mode.release.right=_{isrclick} ^{uihintkey}
click-after-ui-hint-mode.to.ui-hint-mode=wait-250
click-after-ui-hint-mode.clear-variables=+uihintkey-250 | wait-250
# Quickly press the same hint key again to perform a second click.
click-after-ui-hint-mode.position-history.save-position=-uihintkey
hold-after-ui-hint-mode.indicator=normal-mode.indicator
hold-after-ui-hint-mode.to.normal-mode=^{uihintkey} _{rightctrl}
hold-after-ui-hint-mode.to.ui-hint-mode=^{uihintkey leftbutton rightctrl}

# tap-dance
# Single f1 tap -> b, double tap -> c, triple tap -> d
#normal-mode.macro.singletapf1=#!{f1}-200 +f1 -f1-200 -> +b -b
#normal-mode.macro.doubletapf1=#!{f1}-200 +f1 -f1-0-200 +f1 -f1-200 -> +c -c
#normal-mode.macro.tripletapf1=#!{f1}-200 +f1 -f1-0-200 +f1 -f1-0-200 +f1 -f1 -> +d -d

# tap-dance-eager
#normal-mode.macro.eagersingletapf1=#!{f1}-200 +f1 -f1 -> +b -b
## Delete output of single tap first (backspace).
#normal-mode.macro.eagerdoubletapf1=#!{f1}-200 +f1 -f1-0-200 +f1 -f1 -> +backspace -backspace +c -c
#normal-mode.break-combo-preparation=+f1 -f1-0-200 +f1 -f1

